        #entrance-overlay {
            position: fixed;

            background-position: center; /* 讓圖片置中 */
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 確保在最上層 */
            transition: opacity 3s ease, visibility 5s; /* 消失時的過場動畫 */
            cursor: pointer;
        }
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* 音樂播放時的旋轉動畫 */
        .rotating {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 當加上 .hidden 類別時，遮罩會慢慢變透明並消失 */
        #entrance-overlay.hidden {
            opacity: 0;
            visibility: hidden;

        .entrance-content {

        .message_icon {

        @keyframes pulse {

        }
        /* 按鈕 */

        .btn:hover { background-color: #bc8a5f; transform: translateY(-3px); }

        /* 倒數計時 */

        .time-box { background: #faedcd; padding: 15px; border-radius: 10px; min-width: 70px; }
        .time-box span { display: block; font-size: 1.5rem; font-weight: bold; }
    </style>

    <style>
        .fig01 {
            /* position: absolute; */

            }
        .slideshow-container {
        position: relative;
        width: 100%;       /* 寬度隨螢幕縮放 */
        height: 70vh;      /* 使用 vh (螢幕高度百分比)，讓它在手機上也有一定高度 */

        overflow: hidden;
        }
        .QR-img {
            position: relative;

            max-width: 200px;
            width: 50vh;
            object-fit: contain;
            /* transform: translate(-50%, -50%); 絕對定位下的完美居中 */
        }
        .fade-img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* 絕對定位下的完美居中 */
        
        width: 100%;
        height: 100%;
        
        /* 關鍵屬性：不變形 */
        object-fit: contain; 
        /* 如果你希望看到整張圖不被裁切（但會有留白），請改用 object-fit: contain; */
        
        opacity: 0;
        z-index: 1;
        }

        /* 即將出現的下一張：直接顯示並稍微提高層級 */
        .fade-img.active {
        opacity: 1;
        z-index: 2;
        }

        /* 正在淡出的那張：放在最頂層，執行透明度動畫 */
        .fade-img.exiting {
        opacity: 0;
        z-index: 3;
        transition: opacity 1.5s ease-in-out;
        }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    


    <script>
        const images = document.querySelectorAll('.fade-img');
        let currentIndex = 0;

        function nextImage() {
        const currentImg = images[currentIndex];
        const nextIndex = (currentIndex + 1) % images.length;
        const nextImg = images[nextIndex];

        // 1. 讓當前圖片變成「正在淡出」狀態 (跑到最上層並開始變透明)
        currentImg.classList.add('exiting');
        currentImg.classList.remove('active');

        // 2. 讓下一張圖片「立刻出現」在它後面 (透明度已經是 1)
        nextImg.classList.add('active');

        // 3. 當淡出動畫結束後，移除 exiting 標籤，恢復原狀供下次循環
        setTimeout(() => {
            currentImg.classList.remove('exiting');
        }, 1500); // 這裡的時間要跟 CSS transition 一致

        currentIndex = nextIndex;
        }

        setInterval(nextImage, 300);

        // 設定婚禮日期
        const weddingDate = new Date("Mar 28, 2026 12:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);

        const swiper = new Swiper(".mySwiper", {
            loop: true,               // 循環播放
            spaceBetween: 30,         // 照片間距
            centeredSlides: true,
            autoplay: {
                delay: 3500,          // 每 3.5 秒自動換圖
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,      // 點點可以點擊
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });
    </script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
    // AOS.init({
    //     duration: 2000, // 動畫持續時間 (毫秒)
    //     once: true,     // 是否只動畫一次（滑回去再滑下來要不要再動一次）
    // });
    function toggleMusic() {
        const music = document.getElementById('bgMusic');
        const icon = document.getElementById('music-icon');
        const btn = document.getElementById('music-control');

        if (music.paused) {
            music.play();
            btn.classList.add('rotating');
        } else {
            music.pause();
            btn.classList.remove('rotating');
        }
    }
    function startWedding() {
        // 1. 取得遮罩元素並加上 .hidden 類別
        const overlay = document.getElementById('entrance-overlay');
        overlay.classList.add('hidden');

        // 2. 啟動音樂
        const music = document.getElementById('bgMusic');
        music.volume = 0.2;
        music.play().catch(function(error) {
            console.log("播放被瀏覽器攔截了:", error);
        });

        // 3. (選配) 這裡可以重新啟動 AOS 動畫，讓主頁面的動畫從頭開始
        setTimeout(() => {
            AOS.init({
                duration: 3000,
                once: true,
                offset: 100 // 距離滾動條多少距離觸發
            });
        }, 2000);
    }
    </script>
